ا<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض الفنون الرقمي | لوحة الشرف</title>
    <style>
        /* -----------------------------------------------------------
           1. VARIABLES & BASE STYLES (The Museum Palette)
           Experience tip: Avoid pure white (#FFF) or pure black (#000).
           Soft contrasts are premium and comfortable for the eyes.
        ----------------------------------------------------------- */
        :root {
            --bg-museum: #f5f2eb;      /* بيج دافئ - لون جدران المتاحف */
            --bg-card: #faf8f5;        /* عاجي فاتح للوحات */
            --text-primary: #2c2a27;   /* بني داكن جداً مريح للقراءة */
            --text-muted: #706c64;     /* رمادي دافئ للتفاصيل */
            --accent: #8c7853;         /* ذهبي مطفأ / برونزي */
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
            --shadow-frame: 0 15px 35px rgba(44, 42, 39, 0.15);
            --font-sans: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-museum);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* -----------------------------------------------------------
           2. HEADER & NAVIGATION (Minimalist & Elegant)
        ----------------------------------------------------------- */
        header {
            padding: 4rem 2rem 2rem 2rem;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        header .museum-badge {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 1rem;
            display: inline-block;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 300; /* خط خفيف يعطي طابع الفخامة */
            letter-spacing: -1px;
            margin-bottom: 1rem;
        }

        header p {
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
            font-size: 1.1rem;
        }

        /* Filter Tabs */
        .filter-nav {
            margin: 3rem 0 1rem 0;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            list-style: none;
        }

        .filter-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            transition: var(--transition-smooth);
            position: relative;
        }

        .filter-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background-color: var(--accent);
            transition: var(--transition-smooth);
            transform: translateX(-50%);
        }

        .filter-btn.active, .filter-btn:hover {
            color: var(--text-primary);
        }

        .filter-btn.active::after {
            width: 80%;
        }

        /* -----------------------------------------------------------
           3. GALLERY GRID (The Exhibition Wall)
        ----------------------------------------------------------- */
        .gallery-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 3rem; /* مساحات واسعة للتنفس بين اللوحات */
        }

        /* Art Card - Designed like a real museum frame label */
        .art-card {
            background-color: var(--bg-card);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: var(--transition-smooth);
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .art-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-frame);
        }

        .art-frame {
            position: relative;
            overflow: hidden;
            aspect-ratio: 4 / 3; /* أبعاد ثابتة واحترافية للصور */
            background-color: #eae6df;
        }

        .art-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: var(--transition-smooth);
            filter: sepia(10%) contrast(95%); /* فلتر خفيف جداً ليتناسق مع ثيم البيج */
        }

        .art-card:hover .art-frame img {
            transform: scale(1.04);
            filter: sepia(0%) contrast(100%);
        }

        /* Museum Label Style */
        .art-label {
            padding: 1.5rem;
            border-top: 1px solid rgba(140, 120, 83, 0.1);
        }

        .art-title {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 0.3rem;
        }

        .art-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .art-year {
            font-style: italic;
            color: var(--accent);
        }

        /* -----------------------------------------------------------
           4. LIGHTBOX (The Private Viewing Room)
        ----------------------------------------------------------- */
        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(44, 42, 39, 0.95); /* خلفية داكنة جداً للتركيز على اللوحة */
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: var(--transition-smooth);
            z-index: 1000;
            padding: 2rem;
        }

        .lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80vh;
            transform: scale(0.95);
            transition: var(--transition-smooth);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 2rem;
            right: 2rem;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.7;
            transition: var(--transition-smooth);
        }

        .lightbox-close:hover {
            opacity: 1;
            transform: rotate(90deg);
        }

        /* -----------------------------------------------------------
           5. FOOTER
        ----------------------------------------------------------- */
        footer {
            text-align: center;
            padding: 5rem 2rem 3rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid rgba(140, 120, 83, 0.1);
            max-width: 1200px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <header>
        <span class="museum-badge">المعرض الافتراضي الشخصي</span>
        <h1>متحف الظلال والألوان</h1>
        <p>مساحة رقمية منسقة تعرض اللوحات الفنية والرسمات الرقمية الرصينة، حيث تلتقي بساطة التصميم بعمق الفن.</p>
        
        <ul class="filter-nav">
            <li><button class="filter-btn active" data-filter="all">كل الأعمال</button></li>
            <li><button class="filter-btn" data-filter="painting">رسم زيتي</button></li>
            <li><button class="filter-btn" data-filter="digital">رقمي</button></li>
            <li><button class="filter-btn" data-filter="sketch">مخطوطات (سكتش)</button></li>
        </ul>
    </header>

    <main class="gallery-container" id="gallery">
        </main>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <img src="" alt="Viewing Room" class="lightbox-content" id="lightbox-img">
    </div>

    <footer>
        <p>© ٢٠٢٦ جميع الحقوق محفوظة لملفك الفني. صُنع بشغف لـ GitHub.</p>
    </footer>

    <script>
        // 1. Mock Data Source - (In production, this comes from an API or JSON file)
        // Senior Tip: Keep your data separated from your presentation layer.
        const artPieces = [
            {
                title: "شروق هادئ",
                category: "painting",
                year: "٢٠٢٤",
                artist: "أنت",
                // يمكنك استبدال هذه الروابط بصورك الحقيقية لاحقاً داخل مجلد images/
                image: "https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&w=800&q=80"
            },
            {
                title: "عزلة رقمية",
                category: "digital",
                year: "٢٠٢٥",
                artist: "أنت",
                image: "https://images.unsplash.com/photo-1513364776144-60967b0f800f?auto=format&fit=crop&w=800&q=80"
            },
            {
                title: "تفاصيل بورتريه القديم",
                category: "sketch",
                year: "٢٠٢٣",
                artist: "أنت",
                image: "https://images.unsplash.com/photo-1579783928621-7a13d66a6211?auto=format&fit=crop&w=800&q=80"
            },
            {
                title: "انعكاس الضوء على الجدار",
                category: "painting",
                year: "٢٠٢٦",
                artist: "أنت",
                image: "https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&w=800&q=80"
            },
            {
                title: "أشجار الخريف الرقمية",
                category: "digital",
                year: "٢٠٢٥",
                artist: "أنت",
                image: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=800&q=80"
            },
            {
                title: "دراسة في الهندسة المعمارية",
                category: "sketch",
                year: "٢٠٢٤",
                artist: "أنت",
                image: "https://images.unsplash.com/photo-1605721911519-3dfeb3be25e7?auto=format&fit=crop&w=800&q=80"
            }
        ];

        // 2. DOM Elements
        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxClose = document.getElementById('lightbox-close');
        const filterButtons = document.querySelectorAll('.filter-btn');

        // 3. Initialize Gallery Function
        function renderGallery(filter = 'all') {
            // Clear current wall
            gallery.innerHTML = '';
            
            // Filter logic
            const filteredData = filter === 'all' 
                ? artPieces 
                : artPieces.filter(item => item.category === filter);

            // Render loop with staggered animation handling
            filteredData.forEach((art, index) => {
                const card = document.createElement('div');
                card.className = `art-card`;
                card.style.animationDelay = `${index * 0.05}s`; // Stagger effect

                card.innerHTML = `
                    <div class="art-frame">
                        <img src="${art.image}" alt="${art.title}" loading="lazy">
                    </div>
                    <div class="art-label">
                        <h3 class="art-title">${art.title}</h3>
                        <div class="art-meta">
                            <span class="art-artist">${art.artist}</span>
                            <span class="art-year">${art.year}</span>
                        </div>
                    </div>
                `;

                // Event: Click to inspect image (Lightbox)
                card.querySelector('.art-frame').addEventListener('click', () => {
                    openLightbox(art.image);
                });

                gallery.appendChild(card);
            });
        }

        // 4. Lightbox Functions (Open / Close)
        function openLightbox(src) {
            lightboxImg.src = src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden'; // Lock background scroll
        }

        function closeLightbox() {
            lightbox.classList.remove('active');
            document.body.style.overflow = ''; // Unlock scroll
            setTimeout(() => { lightboxImg.src = ''; }, 400); // Clear src after transition
        }

        // 5. Event Listeners Setup
        lightboxClose.addEventListener('click', closeLightbox);
        lightbox.addEventListener('click', (e) => {
            if(e.target === lightbox) closeLightbox(); // Close if clicked outside image
        });

        // Filter functionality implementation
        filterButtons.forEach(button => {
            button.addEventListener('click', (e) => {
                // Remove active class from all
                filterButtons.forEach(btn => btn.classList.remove('active'));
                // Add to current
                e.target.classList.add('active');
                // Re-render
                renderGallery(e.target.getAttribute('data-filter'));
            });
        });

        // 6. Execution on Load
        document.addEventListener('DOMContentLoaded', () => {
            renderGallery();
        });
    </script>
</body>
</html>
