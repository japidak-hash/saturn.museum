<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متحف ساترن</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

        /* === إعدادات الصفحة الرئيسية (ثيم كوكب زحل المميز) === */
        :root {
            --bg-color: #0a0705; /* فضاء داكن جداً مائل للدفء */
            --text-color: #fcf6eb; /* لون كريمي فاتح ومريح */
            --accent-1: #F2C572; /* ذهبي ساطع مستوحى من حلقات زحل */
            --accent-2: #D9B48F; /* نحاسي هادئ */
            --card-bg: rgba(242, 197, 114, 0.04);
            --border-color: rgba(242, 197, 114, 0.15);
            --transition-speed: 0.5s;
            --nebula-glow: rgba(242, 197, 114, 0.15);
        }

        /* ثيمات الأقسام المخصصة */
        body.theme-titan {
            --bg-color: #1A1A1A; 
            --text-color: #E8D4B0; 
            --accent-1: #D18A39; 
            --accent-2: #A65A2A; 
            --card-bg: rgba(26, 26, 26, 0.6);
            --border-color: rgba(209, 138, 57, 0.3);
            --nebula-glow: rgba(209, 138, 57, 0.12);
        }
        body.theme-rhea {
            --bg-color: #F8F8F8; 
            --text-color: #1c2529; 
            --accent-1: #4A90E2; 
            --accent-2: #B7D7E8; 
            --card-bg: rgba(255, 255, 255, 0.9);
            --border-color: #D9D9D9;
            --nebula-glow: rgba(183, 215, 232, 0.4);
        }
        body.theme-iapetus {
            --bg-color: #111111; 
            --text-color: #FFFFFF; 
            --accent-1: #BDBDBD; 
            --accent-2: #6E6E6E; 
            --card-bg: rgba(28, 28, 28, 0.7);
            --border-color: #6E6E6E;
            --nebula-glow: rgba(255, 255, 255, 0.05);
        }
        body.theme-enceladus {
            --bg-color: #FFFFFF; 
            --text-color: #111111; 
            --accent-1: #2D82B7; 
            --accent-2: #9FE2FF; 
            --card-bg: rgba(240, 248, 255, 0.9);
            --border-color: #D7E3EA;
            --nebula-glow: rgba(159, 226, 255, 0.4);
        }
        body.theme-dione {
            --bg-color: #151515; 
            --text-color: #F3E9D2; 
            --accent-1: #D4AF37; 
            --accent-2: #5E412F; 
            --card-bg: rgba(30, 25, 22, 0.7);
            --border-color: #D4AF37;
            --nebula-glow: rgba(212, 175, 55, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1), color var(--transition-speed) ease;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%; left: 50%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, var(--nebula-glow) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            transition: background var(--transition-speed) ease;
            animation: cosmicPulse 8s infinite alternate ease-in-out;
        }

        @keyframes cosmicPulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        /* تأثير النجوم المتلألئة (أكثر وضوحاً) */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -2;
            background: transparent url('https://www.transparenttextures.com/patterns/stardust.png') repeat;
            opacity: 0.9; /* تم زيادة الوضوح بشكل كبير */
            transition: filter var(--transition-speed) ease, opacity var(--transition-speed) ease;
        }

        /* عكس لون النجوم في الأقسام البيضاء لتكون مرئية وواضحة */
        body.theme-rhea .stars, body.theme-enceladus .stars {
            filter: invert(1);
            opacity: 0.5;
        }

        header {
            text-align: center;
            padding: 35px 20px 25px 20px;
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom, rgba(0,0,0,0.25), transparent);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--accent-1);
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            text-shadow: 0 0 25px var(--nebula-glow);
            transition: color var(--transition-speed);
        }

        .subtitle {
            font-size: 1.05rem;
            color: var(--text-color);
            opacity: 0.8;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* === تنسيقات شريط البحث === */
        .search-container {
            margin: 0 auto 25px auto;
            max-width: 500px;
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-color);
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            text-align: right;
        }

        /* تعديل لون البحث في الأقسام المضيئة */
        body.theme-rhea .search-container input, body.theme-enceladus .search-container input {
            background: rgba(0, 0, 0, 0.05);
            color: #111;
        }

        .search-container input::placeholder {
            color: var(--text-color);
            opacity: 0.6;
        }

        .search-container input:focus {
            border-color: var(--accent-1);
            box-shadow: 0 0 15px var(--nebula-glow);
            background: rgba(255, 255, 255, 0.1);
        }

        /* === شريط الأقسام (تعديل الأزرار لتعرض الأسماء بطابقين) === */
        nav {
            display: flex;
            justify-content: flex-start; 
            gap: 12px;
            overflow-x: auto; 
            padding: 10px 20px;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; 
        }

        nav::-webkit-scrollbar { display: none; }
        nav { -ms-overflow-style: none; scrollbar-width: none; }

        @media (min-width: 769px) {
            nav { justify-content: center; overflow-x: visible; }
        }

        nav button {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 25px;
            border-radius: 15px; /* شكل المربع ذو الزوايا الدائرية يناسب النصوص المزدوجة أكثر */
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* تفعيل العرض الطابقي (كلمة فوق كلمة) */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        /* تنسيق الكلمة الإنجليزية (اسم القمر) */
        .moon-name {
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 1px;
            font-family: Arial, sans-serif; /* خط مميز للإنجليزية */
        }

        /* تنسيق الكلمة العربية (نوع الفن) */
        .art-type {
            font-size: 0.85rem;
            font-weight: 500;
            opacity: 0.8;
        }

        nav button:hover {
            transform: translateY(-4px);
            border-color: var(--accent-1);
            box-shadow: 0 5px 15px var(--nebula-glow);
            background: rgba(255, 255, 255, 0.08);
        }

        nav button.active {
            background-color: var(--accent-1);
            color: var(--bg-color) !important;
            border-color: var(--accent-1);
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px var(--nebula-glow);
        }

        nav button.active .art-type {
            opacity: 1;
            font-weight: 700;
        }

        main {
            padding: 40px 5%;
            max-width: 1200px;
            margin: 0 auto;
            animation: fadeInUp 0.7s cubic-bezier(0.215, 0.610, 0.355, 1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .home-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            line-height: 1.9;
        }
        
        .home-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: floatEffect 6s infinite ease-in-out alternate;
        }

        .home-card:nth-child(2) { animation-delay: 1.5s; }

        @keyframes floatEffect {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-12px); }
        }

        .home-card h2 {
            color: var(--accent-1);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            transition: color var(--transition-speed);
        }

        .teachers-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-1) 0%, var(--accent-2) 100%);
            color: #0b0f19;
            padding: 6px 18px;
            border-radius: 50px;
            margin-bottom: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        
        body.theme-rhea .teachers-badge, body.theme-enceladus .teachers-badge {
            color: #ffffff;
            background: var(--accent-1);
        }

        .gallery-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .gallery-header h2 {
            font-size: 2.3rem;
            color: var(--accent-1);
            margin-bottom: 8px;
            font-weight: 900;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .art-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            position: relative;
        }

        .art-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: var(--accent-1);
            box-shadow: 0 15px 35px var(--nebula-glow);
        }

        .moon-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--accent-1);
            z-index: 2;
        }

        .art-image-container {
            width: 100%;
            height: 240px;
            overflow: hidden;
            position: relative;
        }

        .art-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .art-card:hover .art-image {
            transform: scale(1.08); 
        }

        .art-info { padding: 22px; }

        .art-info h3 {
            color: var(--accent-1);
            margin-bottom: 6px;
            font-size: 1.3rem;
            font-weight: 700;
        }
        
        .art-info .artist {
            font-size: 0.88rem;
            color: var(--text-color);
            opacity: 0.6;
            margin-bottom: 15px;
            display: block;
            font-weight: 500;
        }

        .art-info p {
            font-size: 0.95rem;
            opacity: 0.85;
            line-height: 1.7;
        }

        @media (max-width: 768px) {
            .home-layout { grid-template-columns: 1fr; gap: 20px; }
            h1 { font-size: 2.2rem; }
            .home-card { animation: none; } 
        }
        /* === تنسيقات الفوتر (حقوق الملكية) === */
        footer {
            text-align: center;
            padding: 35px 20px;
            margin-top: auto; /* لضمان بقائه في الأسفل */
            border-top: 1px solid var(--border-color);
            background: linear-gradient(to top, rgba(0, 0, 0, 0.4), transparent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .footer-content p {
            font-size: 1.05rem;
            color: var(--text-color);
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .footer-content .dev-rights {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .footer-content .dev-rights span {
            color: var(--accent-1);
            font-weight: 900;
            letter-spacing: 0.5px;
            text-shadow: 0 0 15px var(--nebula-glow);
            transition: color var(--transition-speed);
        }
        /* =========================================
           تعديلات الألوان ووضوح النصوص (بناءً على طلبك)
           ========================================= */

        /* 1. توضيح نص الوصف تحت اسم القسم (مثل: قسم الرسم - ضباب تيتان) */
        .gallery-header p {
            color: #ffffff !important; /* لون أبيض ساطع دائماً */
            font-size: 1.15rem;
            font-weight: 700;
            background-color: rgba(0, 0, 0, 0.65); /* خلفية سوداء شفافة تبرز النص */
            display: inline-block;
            padding: 6px 20px;
            border-radius: 30px;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        /* 2. تخصيص لون ثابت لكل زر بناءً على ثيم القسم الخاص به */
        #btn-home { --btn-theme: #F2C572; --btn-text: #0a0705; }
        #btn-titan { --btn-theme: #D18A39; --btn-text: #ffffff; }
        #btn-rhea { --btn-theme: #4A90E2; --btn-text: #ffffff; }
        #btn-iapetus { --btn-theme: #BDBDBD; --btn-text: #111111; }
        #btn-enceladus { --btn-theme: #2D82B7; --btn-text: #ffffff; }
        #btn-dione { --btn-theme: #D4AF37; --btn-text: #111111; }

        /* تطبيق لون الإطار الثابت لكل زر */
        nav button {
            border: 1px solid var(--btn-theme) !important;
        }

        /* تلوين الكلمة الإنجليزية (اسم القمر) بلون الثيم الثابت */
        nav button .moon-name {
            color: var(--btn-theme) !important;
        }

        /* تأثير عند وضع الماوس على الزر (Hover) */
        nav button:hover {
            border-color: var(--btn-theme) !important;
            box-shadow: 0 5px 15px var(--btn-theme) !important;
        }

        /* تأثير عند تفعيل الزر (الدخول للقسم) */
        nav button.active {
            background-color: var(--btn-theme) !important;
            border-color: var(--btn-theme) !important;
            box-shadow: 0 8px 25px var(--btn-theme) !important;
        }

        /* تلوين النصوص داخل الزر عند تفعيله لتتناسب مع لون الخلفية الجديدة */
        nav button.active .moon-name,
        nav button.active .art-type {
            color: var(--btn-text) !important;
        }
        /* === زر الكسوف الكوني العائم === */
        .eclipse-toggle {
            position: fixed;
            bottom: 30px;
            left: 30px; /* عائم في جهة اليسار بشكل أنيق */
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: rgba(10, 7, 5, 0.85);
            border: 2px solid #F2C572;
            color: #F2C572;
            font-size: 1.6rem;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px rgba(242, 197, 114, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        .eclipse-toggle:hover {
            transform: scale(1.1) rotate(180deg);
            border-color: #fff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.6);
        }

        /* === ثيم الكسوف الكوني العاصف (عند التفعيل) === */
        body.eclipse-mode {
            --bg-color: #020203 !important; /* عتمة الفضاء السحيق */
            --text-color: #f1f5f9 !important;
            --accent-1: #ffd700 !important; /* ذهبي نيون خالص كأشعة الكسوف */
            --accent-2: #cbd5e1 !important;
            --card-bg: rgba(5, 5, 5, 0.95) !important;
            --border-color: rgba(255, 215, 0, 0.2) !important;
            --nebula-glow: rgba(255, 215, 0, 0.15) !important;
        }

        /* إشعاع النيون للبطاقات أثناء الكسوف */
        body.eclipse-mode .art-card,
        body.eclipse-mode .home-card {
            border: 1px solid rgba(255, 215, 0, 0.25) !important;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.1) !important;
            background: rgba(3, 3, 5, 0.9) !important;
        }

        /* تأثير المرور فوق البطاقات أثناء الكسوف */
        body.eclipse-mode .art-card:hover,
        body.eclipse-mode .home-card:hover {
            border-color: #ffd700 !important;
            box-shadow: 0 0 35px rgba(255, 215, 0, 0.35) !important;
            transform: translateY(-8px) scale(1.02);
        }

        /* توهج هالة الكسوف في خلفية الصفحة */
        body.eclipse-mode::before {
            background: radial-gradient(circle, rgba(255, 215, 0, 0.08) 0%, transparent 60%) !important;
            animation: eclipsePulse 4s infinite alternate ease-in-out !important;
        }

        @keyframes eclipsePulse {
            0% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
        }
    </style>
</head>
<body class="theme-home">
    <div class="stars"></div>

    <header>
        <h1>متحف ساترن</h1>
        <p class="subtitle">هذا المتحف تابع لأكاديمية الفنون</p>
        
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="ابحث عن لوحة، فنان، أو وصف..." oninput="handleSearch()">
        </div>

        <nav id="nav-buttons">
            <button onclick="loadPage('home')" id="btn-home" class="active">
                <span class="moon-name">Saturn</span>
                <span class="art-type">الرئيسية</span>
            </button>
            <button onclick="loadPage('titan')" id="btn-titan">
                <span class="moon-name">Titan</span>
                <span class="art-type">الرسم</span>
            </button>
            <button onclick="loadPage('rhea')" id="btn-rhea">
                <span class="moon-name">Rhea</span>
                <span class="art-type">التلوين</span>
            </button>
            <button onclick="loadPage('iapetus')" id="btn-iapetus">
                <span class="moon-name">Iapetus</span>
                <span class="art-type">التصوير</span>
            </button>
            <button onclick="loadPage('enceladus')" id="btn-enceladus">
                <span class="moon-name">Enceladus</span>
                <span class="art-type">التصميم</span>
            </button>
            <button onclick="loadPage('dione')" id="btn-dione">
                <span class="moon-name">Dione</span>
                <span class="art-type">الخط</span>
            </button>
        </nav>
    </header>

    <main id="content-area">
        </main>

    <script>
        const galleryData = {
            titan: [
                {
                    title: "عاصفة تيتان الذهبية",
                    artist: "فنان الأكاديمية",
                    desc: "لوحة زيتية تعبر عن العواصف الرملية والضباب الكثيف في غلاف تيتان.",

                {

            ],
            rhea: [
                {
                    title: "بلورات الصقيع المضيء",

                    desc: "عمل فني رقمي يبرز جمال التلوين والأزرق الجليدي المتلألئ.",
                    imgUrl: "https://images.unsplash.com/photo-1563089145-599997674d42?w=500"

            ],
            iapetus: [
                {
                    title: "التضاد الكوني",
                    artist: "ليلى",
                    desc: "صورة فوتوغرافية عالية التباين، تلعب على التضاد الحاد بين النور الساطع والظلام الدامس.",
                    imgUrl: "https://images.unsplash.com/photo-1502134249126-9f3755a50d78?w=500"
                }
            ],
            enceladus: [
                {
                    title: "بوابة الغد الهندسية",
                    artist: "كارول",
                    desc: "تصميم واجهة مستخدم وهياكل ثلاثية الأبعاد تعتمد على درجات السماوي الفضي لخلق طابع تكنولوجي مستقبلية.",
                    imgUrl: "https://images.unsplash.com/photo-1614741118887-7a4ee193a5fa?w=500"
                }
            ],
            dione: [
                {
                    title: "مخطوطة الملوك السبعة",
                    artist: "خطاط الأكاديمية",
                    desc: "مخطوطة عربية كلاسيكية مكتوبة بماء الذهب على ورق كريمي فاخر.",
                    imgUrl: "https://images.unsplash.com/photo-1561715276-a2d087060f1d?w=500"
                }
            ]
        };

        const sectionMeta = {
            titan: { title: "Titan", subtitle: "قسم الرسم", themeClass: "theme-titan" },
            rhea: { title: "Rhea", subtitle: "قسم  التلوينء", themeClass: "theme-rhea" },
            iapetus: { title: "Iapetus", subtitle: "قسم التصوير", themeClass: "theme-iapetus" },
            enceladus: { title: "Enceladus", subtitle: "قسم التصميم", themeClass: "theme-enceladus" },
            dione: { title: "Dione", subtitle: "قسم الخط", themeClass: "theme-dione" }
        };

        let currentPage = 'home'; 

        function loadPage(pageId) {
            document.getElementById('searchInput').value = '';
            currentPage = pageId;
            
            const contentArea = document.getElementById('content-area');
            
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${pageId}`).classList.add('active');

            contentArea.style.opacity = 0;

            setTimeout(() => {
                if (pageId === 'home') {
                    document.body.className = 'theme-home';
                    contentArea.innerHTML = renderHomePage();
                } else {
                    document.body.className = sectionMeta[pageId].themeClass;
                    contentArea.innerHTML = renderGalleryPage(pageId);
                }
                contentArea.style.opacity = 1;
            }, 200);
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const contentArea = document.getElementById('content-area');

            if (query === '') {
                loadPage(currentPage);
                return;
            }

            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            document.body.className = 'theme-home'; 

            let searchResults = [];

            for (const moonId in galleryData) {
                const artworks = galleryData[moonId];
                artworks.forEach(art => {
                    if (
                        art.title.toLowerCase().includes(query) ||
                        art.artist.toLowerCase().includes(query) ||
                        art.desc.toLowerCase().includes(query)
                    ) {
                        searchResults.push({ ...art, moonName: sectionMeta[moonId].title });
                    }
                });
            }

            let cardsHtml = '';
            if (searchResults.length > 0) {
                searchResults.forEach(art => {
                    cardsHtml += `
                        <div class="art-card">
                            <div class="moon-badge">${art.moonName}</div>
                            <div class="art-image-container">
                                <img src="${art.imgUrl}" alt="${art.title}" class="art-image" onerror="this.src='https://via.placeholder.com/400x250?text=Image+Not+Found'">
                            </div>
                            <div class="art-info">
                                <h3>${art.title}</h3>
                                <span class="artist">الفنان: ${art.artist}</span>
                                <p>${art.desc}</p>
                            </div>
                        </div>
                    `;
                });
            } else {
                cardsHtml = `<p style="text-align:center; grid-column: 1/-1; opacity:0.8; font-size:1.2rem; margin-top:40px;">لم يتم العثور على نتائج تطابق "${query}" 🌌</p>`;
            }

            contentArea.innerHTML = `
                <div class="gallery-header">
                    <h2>نتائج البحث</h2>
                    <p>عن: ${query}</p>
                </div>
                <div class="gallery-grid">
                    ${cardsHtml}
                </div>
            `;
            
            contentArea.style.opacity = 1;
        }

        function renderHomePage() {
            return `
                <div class="home-layout">
                    <div class="home-card">
                        <h2>إدارة الأكاديمية والمتحف</h2>
                        <div class="teachers-badge">المعلم الأساسي: رهف / ليلى</div><br>
                        <div class="teachers-badge">نائب المعلم: رغد / كارول</div>
                        
                        <h2 style="margin-top: 25px;">عن أكاديمية الفنون</h2>
                        <p>أكاديمية الفنون هي صرح إبداعي يهدف إلى صقل المواهب وتوجيهها نحو الابتكار، نؤمن بأن الفن ليس مجرد هواية، بل هو لغة عالمية تتجاوز حدود الكواكب.</p>
                        
                        <h2 style="margin-top: 25px;">عن الموقع</h2>
                        <p>متحف ساترن هو المعرض الرقمي الرسمي لأكاديمية الفنون. تم استلهام أقسامه من أقمار كوكب زحل، حيث يمثل كل قمر ثيماً فنياً فريداً يعكس نوعاً من أنواع الفنون البصرية المذهلة.</p>
                    </div>
                    <div class="home-card">
                        <h2>قصة الاكتشاف</h2>
                        <p>في رحلة استكشافية خيالية عبر الفضاء السحيق، كانت <strong>رغد</strong> و<strong>رهف</strong> تبحران بمركبتهما الفضائية بحثاً عن إلهام جديد. عندما اقتربتا من كوكب زحل (Saturn)، ذهلتا من جمال حلقاته وأقماره المتلألئة البديعة.</p>
                        <p>قررتا ألا يكتفيا بالمشاهدة، بل أن تحوّلا هذه الأقمار إلى قاعات عرض فنية تنبض بالإبداع والجمال الكوني. أخذتا من ضباب (Titan) قاعة للرسم، ومن جليد (Rhea) مساحة للتلوين، ومن تباين (Iapetus) مكاناً للتصوير، لتخليد هذا الاكتشاف العظيم.</p>
                        
                        <h2 style="margin-top: 25px;">روابط ذات صلة</h2>
                        <ul>
                            <li><a href="#" style="color: var(--accent-1); text-decoration: none; font-weight:bold;">الموقع الرسمي لأكاديمية الفنون ←</a></li>
                            <li><a href="#" style="color: var(--accent-1); text-decoration: none; font-weight:bold;">انضم إلى مجتمع الفنانين العالمي ←</a></li>
                            <li><a href="#" style="color: var(--accent-1); text-decoration: none; font-weight:bold;">تواصل مع الإدارة والدعم ←</a></li>
                        </ul>
                    </div>
                </div>
            `;
        }

        function renderGalleryPage(moonId) {
            const meta = sectionMeta[moonId];
            const artworks = galleryData[moonId] || [];
            let cardsHtml = '';
            
            artworks.forEach(art => {
                cardsHtml += `
                    <div class="art-card">
                        <div class="art-image-container">
                            <img src="${art.imgUrl}" alt="${art.title}" class="art-image" onerror="this.src='https://via.placeholder.com/400x250?text=Image+Not+Found'">
                        </div>
                        <div class="art-info">
                            <h3>${art.title}</h3>
                            <span class="artist">الفنان: ${art.artist}</span>
                            <p>${art.desc}</p>
                        </div>
                    </div>
                `;
            });

            if(artworks.length === 0) {
                cardsHtml = `<p style="text-align:center; grid-column: 1/-1; opacity:0.6;">لا توجد أعمال فنية في هذا القسم حالياً.</p>`;
            }

            return `
                <div class="gallery-header">
                    <h2>${meta.title}</h2>
                    <p>${meta.subtitle}</p>
                </div>
                <div class="gallery-grid">
                    ${cardsHtml}
                </div>
            `;
       
        }
    </script>
    <footer>
        <div class="footer-content">
            <p>هذا الموقع تابع لـ <strong>أكاديمية الفنون</strong> 🌌</p>
            <p class="dev-rights">برمجة وتطوير: <span>ماركو / محمد</span> &copy; <span id="currentDate"></span></p>
        </div>
    </footer>
</body>
</html>
